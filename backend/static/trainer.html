<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Shredder — 訓練師後台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <nav class="navbar">
        <span class="brand">🔪 Knowledge Shredder</span>
        <nav>
            <a href="/static/trainer.html" class="active">訓練師後台</a>
            <a href="/static/learner.html">學習者 App</a>
        </nav>
    </nav>

    <div class="container">

        <!-- ── 領域管理（第一步）────────────────────────────────────────────── -->
        <div class="card">
            <div class="card-title">🏷️ 第一步：設定知識領域</div>

            <form id="domain-form"
                style="display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1rem">
                <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0">
                    <label>領域名稱</label>
                    <input type="text" id="domain-name" placeholder="例如：CRM" required>
                </div>
                <div class="form-group" style="flex:2;min-width:200px;margin-bottom:0">
                    <label>描述（選填）</label>
                    <input type="text" id="domain-desc" placeholder="簡短說明此領域涵蓋範圍">
                </div>
                <button type="submit" class="btn btn-success">＋ 新增領域</button>
            </form>

            <table id="domain-table">
                <thead>
                    <tr>
                        <th>領域</th>
                        <th>描述</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="3" style="color:var(--muted);text-align:center">尚無領域，請先新增</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ── 上傳區（第二步）──────────────────────────────────────────────── -->
        <div class="card">
            <div class="card-title">📤 第二步：上傳訓練文件</div>
            <form id="upload-form">
                <div class="form-group">
                    <label>訓練師 ID</label>
                    <input type="text" id="trainer-id" placeholder="例如：trainer_001" required>
                </div>

                <!-- Drop Zone -->
                <div class="form-group">
                    <label>選擇文件（PDF / Word / TXT，最大 20 MB）</label>
                    <div class="drop-zone" id="drop-zone">
                        <span class="icon">📄</span>
                        <span id="file-label">拖曳或點擊選擇 PDF / Word / TXT</span>
                        <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt">
                    </div>
                </div>

                <!-- Domain Chips -->
                <div class="form-group">
                    <label>選擇知識領域（至少一個，請先在第一步新增領域）</label>
                    <div class="domain-grid" id="domain-chips">
                        <span style="color:var(--muted);font-size:.875rem">載入中…</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="upload-btn">上傳並粉碎</button>
            </form>
        </div>

        <!-- ── 分割預覽 ───────────────────────────────────────────────────────── -->
        <div class="card" id="preview-section">
            <div class="card-title">🔍 分割畫面預覽（左：原始文字 ｜ 右：AI 生成模組）</div>

            <!-- 確認發布 Bar（僅 pending_review 時顯示） -->
            <div id="confirm-bar"
                style="display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:.875rem 1rem;margin-bottom:1rem;gap:1rem;align-items:center;flex-wrap:wrap">
                <div style="flex:1">
                    <strong>⚠️ 請確認模組內容是否符合預期</strong>
                    <span id="confirm-doc-name" style="margin-left:.5rem;color:var(--muted);font-size:.875rem"></span>
                </div>
                <div style="display:flex;gap:.5rem;flex-shrink:0">
                    <button class="btn btn-danger btn-sm" onclick="rejectDocument()">❌ 不發布（刪除）</button>
                    <button class="btn btn-success" onclick="confirmDocument()">✅ 確認發布</button>
                </div>
            </div>

            <div class="split-screen">
                <div class="split-panel">
                    <div class="panel-header">📄 原始文字</div>
                    <div class="panel-body" id="raw-text" style="color:var(--muted)">點擊文件列表中的「預覽模組」</div>
                </div>
                <div class="split-panel">
                    <div class="panel-header">✨ AI 生成微模組</div>
                    <div class="panel-body" id="modules-output" style="color:var(--muted)">尚未選擇文件</div>
                </div>
            </div>
        </div>

        <!-- ── 文件列表 ───────────────────────────────────────────────────────── -->
        <div class="card">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                📋 文件列表
                <button class="btn btn-ghost btn-sm" onclick="loadDocuments()">重新整理</button>
            </div>
            <table id="docs-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>檔名</th>
                        <th>訓練師</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="color:var(--muted);text-align:center">載入中…</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 原本的領域管理區塊已移至頁面頂部 -->

    </div>

    <div id="toast-container"></div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/trainer.js"></script>
</body>

</html>
