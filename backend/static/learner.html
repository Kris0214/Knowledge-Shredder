<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Shredder — 學習者 App</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <nav class="navbar">
        <span class="brand">🔪 Knowledge Shredder</span>
        <nav>
            <a href="/static/trainer.html">訓練師後台</a>
            <a href="/static/learner.html" class="active">學習者 App</a>
        </nav>
    </nav>

    <div class="container">

        <!-- ── 篩選 + 操作 ──────────────────────────────────────────────────────── -->
        <div class="card" style="padding:.875rem 1.25rem;margin-bottom:1rem">
            <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
                <label style="font-weight:600;font-size:.875rem;white-space:nowrap">📂 練習範圍</label>

                <!-- 標籤篩選 -->
                <select id="domain-filter" style="flex:1;min-width:150px">
                    <option value="">全部領域</option>
                </select>

                <!-- 文件篩選 -->
                <select id="doc-filter" style="flex:1;min-width:180px">
                    <option value="">全部文件</option>
                </select>

                <!-- 重新練習 -->
                <button class="btn btn-ghost btn-sm" onclick="retryQueue()" title="重設複習排程、立即再練一次">
                    🔁 重新練習
                </button>
            </div>
        </div>

        <!-- ── 進度統計 ───────────────────────────────────────────────────────── -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem">
            <div class="card" style="text-align:center;padding:1rem">
                <div style="font-size:1.75rem;font-weight:700;color:var(--primary)" id="total-seen">—</div>
                <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">已學習模組數</div>
            </div>
            <div class="card" style="text-align:center;padding:1rem">
                <div style="font-size:1.75rem;font-weight:700;color:var(--warning)" id="due-today">—</div>
                <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">今日待複習</div>
            </div>
            <div class="card" style="text-align:center;padding:1rem">
                <div style="font-size:1.75rem;font-weight:700;color:var(--success)" id="avg-score">—</div>
                <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">平均正確率</div>
            </div>
        </div>

        <!-- ── 進度條 ─────────────────────────────────────────────────────────── -->
        <div class="card" style="padding:.875rem 1.25rem">
            <div
                style="display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:.4rem">
                <span>今日進度</span>
                <span id="progress-text">0 / 0 完成</span>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progress-bar" style="width:0%"></div>
            </div>
        </div>

        <!-- ── 學習區 ─────────────────────────────────────────────────────────── -->
        <div id="learn-area">
            <div class="card" style="text-align:center;padding:3rem;color:var(--muted)">
                <span class="spinner"
                    style="border-color:rgba(0,0,0,.15);border-top-color:var(--primary);width:1.5rem;height:1.5rem"></span>
                <p style="margin-top:.75rem">載入學習佇列中…</p>
            </div>
        </div>

        <!-- ── 學習報告 ───────────────────────────────────────────────────────── -->
        <div class="card" id="stats-section" style="margin-top:1.25rem;display:none">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
                📊 學習報告
                <span id="streak-badge" class="badge badge-blue" style="font-size:.9rem"></span>
            </div>

            <!-- 14 天答題折線圖 -->
            <div style="margin-bottom:1.5rem">
                <div style="font-size:.8rem;color:var(--muted);margin-bottom:.5rem">過去 14 天答題數</div>
                <canvas id="trend-chart" height="100" style="width:100%"></canvas>
            </div>

            <!-- 各領域正確率 -->
            <div style="margin-bottom:1.5rem">
                <div style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">各領域正確率</div>
                <div id="domain-bars"></div>
            </div>

            <!-- 最難模組 -->
            <div>
                <div style="font-size:.8rem;color:var(--muted);margin-bottom:.5rem">最常答錯的模組 Top 5</div>
                <table style="width:100%;font-size:.85rem;border-collapse:collapse" id="hard-table">
                    <thead>
                        <tr style="color:var(--muted);border-bottom:1px solid var(--border)">
                            <th style="text-align:left;padding:.35rem .5rem">模組標題</th>
                            <th style="text-align:center;padding:.35rem .5rem">作答次數</th>
                            <th style="text-align:center;padding:.35rem .5rem">正確率</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="toast-container"></div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/learner.js"></script>
</body>

</html>
